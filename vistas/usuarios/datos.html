  <div class="menu-principal">

    <form onsubmit="myfunc(event)" class="futuristic-form horizontal-form">
      <label class="label-usuario" for="nombre" >Nombre de usuario:</label>
      <input type="text" id="nombre" name="nombre" required style = "width: 170px; margin-right: 20px;"><br>

      <label class="label-grupo" for="grupo">  Grupo:</label>
      <input type="text" id="grupo" name="grupo" required><br>
  </form>

  <form onsubmit="myfunc(event)" class="futuristic-form horizontal-form">
    <label class="label-fecha-practica" for="fecha" >Fecha de práctica:</label>
    <input type="date" id="fecha" name="fecha" required style = "width: 170px; margin-right: 20px;"><br>

    <label class="label-especialidad" for="especialidad">  Especialidad:</label>
    <input type="text" id="especialidad" name="especialidad" required style = "width: 170px; margin-right: 20px;"><br>
  </form>

  <form onsubmit="myfunc(event)" class="futuristic-form horizontal-form">
    <button class="btn-guardar-tabla-csv" value="Guardar" onclick="guardarDatos()" >Guardar tabla</button>
    <input class="btn-registrar-tabla" type ="submit" value="Guardar"/>
</form>

  


    <title>Tabla de datos</title>
    <h1 class="neon-effect" style="font-family: Azonix, Arial, sans-serif;">Tabla de datos</h1>
    <table id="dataTable">
      <thead>
        <tr>
          <th style="font-family: Century Gothic, Arial, sans-serif;">Nombre de usuario</th>
          <th style="font-family: Century Gothic, Arial, sans-serif;">Grupo</th>
          <th style="font-family: Century Gothic, Arial, sans-serif;">Especialidad</th>
          <th style="font-family: Century Gothic, Arial, sans-serif;">Fecha de práctica</th>
        </tr>
      </thead>
      <tbody style="font-family: Century Gothic, Arial, sans-serif;">
        <tr>
        </tr>
      </tbody>
    </table>
    
</body>
